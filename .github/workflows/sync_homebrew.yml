name: Sync Homebrew Formula

on:
  push:
    tags:
      - 'v*' # Triggers when a tag like v1.0.0 or v0.1.2_9 is pushed

jobs:
  sync-formula:
    runs-on: ubuntu-latest

    steps:
      - name: Extract version info
        id: vars
        run: |
          TAG_NAME="${{ github.ref_name }}"
          VERSION=${TAG_NAME#v}

          echo "Tag: $TAG_NAME, Version: $VERSION"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get commit hash for tag
        id: revision
        run: |
          # Fetch the ref object; if it's an annotated tag (tag object), follow the object URL
          REF_JSON=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/${{ steps.vars.outputs.tag_name }}")

          OBJ_TYPE=$(echo "$REF_JSON" | jq -r '.object.type')
          OBJ_URL=$(echo "$REF_JSON"  | jq -r '.object.url')
          OBJ_SHA=$(echo "$REF_JSON"  | jq -r '.object.sha')

          if [ "$OBJ_TYPE" = "commit" ]; then
            REVISION="$OBJ_SHA"
          else
            # Annotated tag — dereference to the underlying commit
            REVISION=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "$OBJ_URL" | jq -r '.object.sha')
          fi

          echo "Revision: $REVISION"
          echo "revision=$REVISION" >> $GITHUB_OUTPUT

      - name: Checkout homebrew-tools repository
        uses: actions/checkout@v4
        with:
          repository: jkleinne/homebrew-tools
          token: ${{ secrets.GH_TOKEN }}
          path: homebrew-tools

      - name: Update lazyspeed.rb formula
        working-directory: homebrew-tools/Formula
        run: |
          FILE="lazyspeed.rb"
          TAG="${{ steps.vars.outputs.tag_name }}"
          REV="${{ steps.revision.outputs.revision }}"
          REPO="${{ github.repository }}"

          echo "Updating $FILE with tag=$TAG revision=$REV..."

          # Write the formula from scratch using printf to avoid heredoc indentation issues
          printf 'class Lazyspeed < Formula\n' > "$FILE"
          printf '  desc "Terminal-based internet speed test"\n' >> "$FILE"
          printf '  homepage "https://github.com/%s"\n' "$REPO" >> "$FILE"
          printf '  url "https://github.com/%s.git",\n' "$REPO" >> "$FILE"
          printf '      tag:      "%s",\n' "$TAG" >> "$FILE"
          printf '      revision: "%s"\n' "$REV" >> "$FILE"
          printf '  license "MIT"\n' >> "$FILE"
          printf '  head "https://github.com/%s.git", branch: "main"\n' "$REPO" >> "$FILE"
          printf '\n' >> "$FILE"
          printf '  depends_on "go" => :build\n' >> "$FILE"
          printf '\n' >> "$FILE"
          printf '  def install\n' >> "$FILE"
          printf '    system "go", "mod", "download"\n' >> "$FILE"
          printf '    system "go", "build", *std_go_args, "."\n' >> "$FILE"
          printf '  end\n' >> "$FILE"
          printf '\n' >> "$FILE"
          printf '  test do\n' >> "$FILE"
          printf '    assert_match "lazyspeed version", shell_output("#{bin}/lazyspeed version")\n' >> "$FILE"
          printf '  end\n' >> "$FILE"
          printf 'end\n' >> "$FILE"

          echo "Formula updated:"
          cat "$FILE"

      - name: Commit and push changes
        working-directory: homebrew-tools
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/lazyspeed.rb

          if git diff --staged --quiet; then
            echo "No changes detected in the formula. Skipping commit."
          else
            echo "Committing changes..."
            git commit -m "bot(formula): update lazyspeed to ${{ steps.vars.outputs.version }}"
            git push
          fi